<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Moss &amp; Moonlight — Enchanted Forest Platformer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: #0a1628;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      width: 100%;
      font-family: 'Georgia', serif;
      color: #88dd88;
      overflow: hidden;
      touch-action: none;
    }
    #game-container {
      position: relative;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 0 60px rgba(100, 200, 150, 0.2);
      max-width: 100vw;
      max-height: 100vh;
    }

    /* Mobile landscape: toon een breder deel van de wereld, geen letterbox */
    @media (pointer: coarse) and (orientation: landscape) {
      html, body {
        overflow: hidden;
      }
      #game-container {
        width: 100vw !important;
        height: 100vh !important;
        max-width: none;
        max-height: none;
        border-radius: 0;
        box-shadow: none;
      }
    }

    /* ── Language selector ───────────────────────────── */
    #lang-select-wrap {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 1001;
    }
    #lang-select {
      background: #1a2e1a;
      border: 1px solid #3a6b3a;
      color: #88dd88;
      font-family: 'Georgia', serif;
      font-size: 13px;
      padding: 4px 8px;
      border-radius: 6px;
      cursor: pointer;
      opacity: 0.75;
    }
    #lang-select:hover { opacity: 1; }

    /* ── Admin Panel ─────────────────────────────────── */
    #admin-toggle {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 1000;
      background: #1a2e1a;
      border: 1px solid #3a6b3a;
      color: #88dd88;
      font-family: 'Georgia', serif;
      font-size: 13px;
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
      opacity: 0.75;
      transition: opacity 0.2s;
    }
    #admin-toggle:hover { opacity: 1; }

    /* Hide admin controls on touch devices (mobile) */
    @media (pointer: coarse) {
      #admin-toggle, #admin-panel { display: none !important; }
    }

    /* ── Mute button ─────────────────────────────────── */
    #mute-btn {
      position: fixed;
      top: 12px;
      right: 96px;
      z-index: 1000;
      background: #1a2e1a;
      border: 1px solid #3a6b3a;
      color: #88dd88;
      font-family: 'Georgia', serif;
      font-size: 15px;
      padding: 4px 10px;
      border-radius: 6px;
      cursor: pointer;
      opacity: 0.75;
      transition: opacity 0.2s;
      line-height: 1;
    }
    #mute-btn:hover { opacity: 1; }
    #mute-btn.muted { color: #667766; border-color: #2a4a2a; }

    #admin-panel {
      position: fixed;
      top: 44px;
      right: 12px;
      z-index: 999;
      background: rgba(10, 22, 40, 0.96);
      border: 1px solid #2a5a2a;
      border-radius: 10px;
      padding: 14px 16px 16px;
      min-width: 200px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.7);
      display: none;
      flex-direction: column;
      gap: 8px;
    }
    #admin-panel.open { display: flex; }
    #admin-panel h3 {
      font-size: 13px;
      color: #aaffaa;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 4px;
      border-bottom: 1px solid #2a4a2a;
      padding-bottom: 6px;
    }
    .admin-section-label {
      font-size: 10px;
      color: #557755;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 4px;
    }
    .admin-btn {
      background: #162a16;
      border: 1px solid #2e5a2e;
      color: #88dd88;
      font-family: 'Georgia', serif;
      font-size: 13px;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      text-align: left;
      transition: background 0.15s, border-color 0.15s;
    }
    .admin-btn:hover { background: #1e3e1e; border-color: #55aa55; color: #aaffaa; }
    .admin-btn.danger { border-color: #5a2e2e; color: #dd8888; }
    .admin-btn.danger:hover { background: #3e1e1e; border-color: #aa5555; color: #ffaaaa; }
    #ap-level-buttons { display: flex; flex-direction: column; gap: 8px; }

    /* ── Mobile touch controls ───────────────────────── */
    #mobile-controls {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 110px;
      pointer-events: none;
      z-index: 900;
    }
    .touch-btn {
      position: absolute;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: auto;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;

      /* Mosgroene gloed — past bij de bosgeest */
      background: radial-gradient(circle at 38% 35%,
        rgba(80, 200, 120, 0.22) 0%,
        rgba(30, 80, 50, 0.38) 60%,
        rgba(10, 30, 20, 0.55) 100%);
      border: 2px solid rgba(100, 220, 130, 0.45);
      box-shadow:
        0 0 12px rgba(80, 220, 120, 0.25),
        inset 0 1px 0 rgba(180, 255, 200, 0.12),
        inset 0 -1px 0 rgba(0, 0, 0, 0.3);

      /* Symbool */
      font-size: 22px;
      color: rgba(160, 255, 180, 0.75);
      text-shadow: 0 0 8px rgba(100, 255, 150, 0.6);

      transition: background 0.08s, box-shadow 0.08s, transform 0.08s;
    }
    .touch-btn:active, .touch-btn.pressed {
      background: radial-gradient(circle at 38% 35%,
        rgba(120, 255, 160, 0.38) 0%,
        rgba(40, 120, 70, 0.55) 60%,
        rgba(10, 40, 25, 0.65) 100%);
      border-color: rgba(160, 255, 190, 0.85);
      box-shadow:
        0 0 22px rgba(80, 255, 130, 0.55),
        inset 0 1px 0 rgba(200, 255, 220, 0.2),
        inset 0 -1px 0 rgba(0, 0, 0, 0.3);
      color: rgba(210, 255, 220, 1);
      text-shadow: 0 0 14px rgba(140, 255, 170, 0.9);
      transform: scale(0.93);
    }

    #btn-left  { width: 76px; height: 76px; bottom: 22px; left: 22px; display: none; }
    #btn-right { width: 76px; height: 76px; bottom: 22px; left: 110px; display: none; }

    /* ── Analogue joystick strip ─────────────────────── */
    #joystick-strip {
      position: absolute;
      bottom: 18px;
      left: 16px;
      width: 101px;
      height: 72px;
      pointer-events: auto;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;

      background: radial-gradient(ellipse at 50% 60%,
        rgba(40, 110, 60, 0.28) 0%,
        rgba(10, 30, 20, 0.50) 100%);
      border: 2px solid rgba(100, 220, 130, 0.35);
      border-radius: 36px;
      box-shadow:
        0 0 14px rgba(80, 220, 120, 0.18),
        inset 0 1px 0 rgba(180, 255, 200, 0.08);

      /* Direction hints */
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
      color: rgba(140, 255, 170, 0.35);
      font-size: 20px;
    }
    #joystick-strip::before { content: '◀'; }
    #joystick-strip::after  { content: '▶'; }

    /* The draggable thumb */
    #joystick-thumb {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 52px;
      height: 52px;
      border-radius: 50%;
      pointer-events: none;
      background: radial-gradient(circle at 38% 35%,
        rgba(120, 255, 160, 0.38) 0%,
        rgba(40, 120, 70, 0.55) 60%,
        rgba(10, 40, 25, 0.65) 100%);
      border: 2px solid rgba(160, 255, 190, 0.70);
      box-shadow:
        0 0 18px rgba(80, 255, 130, 0.45),
        inset 0 1px 0 rgba(200, 255, 220, 0.15);
      transition: left 0.05s ease-out;
    }
    #joystick-strip.active #joystick-thumb {
      transition: none;
    }

    #btn-jump  {
      width: 88px; height: 88px; bottom: 16px; right: 28px;
      /* Jump-knop iets groter gloeien */
      background: radial-gradient(circle at 38% 35%,
        rgba(100, 200, 255, 0.20) 0%,
        rgba(20, 60, 100, 0.42) 60%,
        rgba(5, 18, 40, 0.58) 100%);
      border-color: rgba(100, 180, 255, 0.50);
      box-shadow:
        0 0 14px rgba(80, 160, 255, 0.28),
        inset 0 1px 0 rgba(180, 220, 255, 0.12),
        inset 0 -1px 0 rgba(0, 0, 0, 0.3);
      color: rgba(160, 210, 255, 0.80);
      text-shadow: 0 0 8px rgba(100, 180, 255, 0.65);
      animation: jump-btn-pulse 2.4s ease-in-out infinite;
    }
    #btn-jump:active, #btn-jump.pressed {
      background: radial-gradient(circle at 38% 35%,
        rgba(140, 220, 255, 0.42) 0%,
        rgba(30, 90, 160, 0.58) 60%,
        rgba(5, 20, 50, 0.68) 100%);
      border-color: rgba(160, 220, 255, 0.90);
      box-shadow:
        0 0 26px rgba(100, 200, 255, 0.60),
        inset 0 1px 0 rgba(200, 230, 255, 0.2),
        inset 0 -1px 0 rgba(0, 0, 0, 0.3);
      color: rgba(210, 235, 255, 1);
      text-shadow: 0 0 16px rgba(140, 210, 255, 0.95);
      animation: none;
      transform: scale(0.93);
    }
    @keyframes jump-btn-pulse {
      0%, 100% { box-shadow: 0 0 14px rgba(80, 160, 255, 0.28), inset 0 1px 0 rgba(180,220,255,0.12), inset 0 -1px 0 rgba(0,0,0,0.3); }
      50%       { box-shadow: 0 0 26px rgba(80, 160, 255, 0.52), inset 0 1px 0 rgba(180,220,255,0.12), inset 0 -1px 0 rgba(0,0,0,0.3); }
    }

    /* Show mobile controls only on touch devices */
    @media (pointer: coarse) {
      #mobile-controls { display: block; }
    }

    /* ── Cover screen ────────────────────────────────── */
    #cover-screen {
      position: fixed;
      inset: 0;
      z-index: 2000;
      background: #060d1a;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: opacity 0.6s ease;
    }
    #cover-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }
    #cover-img {
      max-width: 100vw;
      max-height: 100vh;
      object-fit: contain;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }
  </style>
</head>
<body>
  <!-- Language selector -->
  <div id="lang-select-wrap">
    <select id="lang-select">
      <option value="nl">🇳🇱 Nederlands</option>
      <option value="en">🇬🇧 English</option>
      <option value="de">🇩🇪 Deutsch</option>
      <option value="fr">🇫🇷 Français</option>
      <option value="es">🇪🇸 Español</option>
      <option value="pt">🇧🇷 Português</option>
      <option value="zh">🇨🇳 中文</option>
      <option value="hi">🇮🇳 हिन्दी</option>
      <option value="ar">🇸🇦 العربية</option>
      <option value="ja">🇯🇵 日本語</option>
      <option value="ru">🇷🇺 Русский</option>
    </select>
  </div>

  <!-- Mute button -->
  <button id="mute-btn" title="Geluid aan/uit">🔊</button>

  <!-- Admin toggle -->
  <button id="admin-toggle">⚙ Admin</button>

  <!-- Admin panel (labels updated by JS after i18n loads) -->
  <div id="admin-panel">
    <h3 id="ap-title">Admin Panel</h3>

    <span class="admin-section-label" id="ap-lbl-levels">Levels</span>
    <!-- Level buttons injected dynamically by JS -->
    <div id="ap-level-buttons"></div>

    <span class="admin-section-label" id="ap-lbl-actions">Actions</span>
    <button class="admin-btn" id="ap-btn-skip" onclick="adminSkipLevel()">⏭ Skip to next level</button>
    <button class="admin-btn" id="ap-btn-lives" onclick="adminRestoreLives()">♥ Restore all lives</button>

    <span class="admin-section-label" id="ap-lbl-editor">Editor</span>
    <button class="admin-btn" id="ap-btn-editor" onclick="window.location.href='editor.html'">✏ Open Level Editor</button>
  </div>

  <!-- Game canvas -->
  <div id="game-container"></div>

  <!-- Cover screen — shown on startup, dismissed on click -->
  <div id="cover-screen">
    <img id="cover-img" src="MandM_Cover.png" alt="Moss &amp; Moonlight">
  </div>

  <!-- Mobile touch buttons -->
  <div id="mobile-controls">
    <!-- Analogue joystick strip (replaces left/right buttons) -->
    <div id="joystick-strip">
      <div id="joystick-thumb"></div>
    </div>
    <div class="touch-btn" id="btn-jump">&#8593;</div>
  </div>

  <script>
    // ── Language selector ─────────────────────────────────────────────────────
    const langSel = document.getElementById('lang-select');
    langSel.value = localStorage.getItem('mm_lang') || 'nl';
    langSel.addEventListener('change', () => {
      window.LANG = langSel.value;
      localStorage.setItem('mm_lang', langSel.value);
      _applyAdminI18n();
      // Also refresh live Phaser text via the game API
      window.gameAdminAPI?.refreshLanguage();
    });

    function _applyAdminI18n() {
      if (!window.T) return;
      document.getElementById('ap-title').textContent    = window.T('admin_panel_title');
      document.getElementById('ap-lbl-levels').textContent  = window.T('admin_levels_label');
      document.getElementById('ap-lbl-actions').textContent = window.T('admin_actions_label');
      document.getElementById('ap-lbl-editor').textContent  = window.T('admin_editor_label');
      document.getElementById('ap-btn-skip').textContent    = window.T('admin_skip');
      document.getElementById('ap-btn-lives').textContent   = window.T('admin_restore');
      document.getElementById('ap-btn-editor').textContent  = window.T('admin_open_editor');
    }

    // Called by game.js after i18n + levels are loaded
    function initAdminPanel(levels) {
      const container = document.getElementById('ap-level-buttons');
      container.innerHTML = '';
      levels.forEach((lvl, i) => {
        const btn = document.createElement('button');
        btn.className = 'admin-btn';
        btn.textContent = '\u25b6 Level ' + (i + 1) + ' \u2014 ' + lvl.name;
        btn.onclick = () => adminJumpLevel(i);
        container.appendChild(btn);
      });
      _applyAdminI18n();
    }
    window.initAdminPanel = initAdminPanel;

    // ── Admin panel toggle ────────────────────────────────────────────────────
    document.getElementById('admin-toggle').addEventListener('click', () => {
      document.getElementById('admin-panel').classList.toggle('open');
    });
    document.addEventListener('click', (e) => {
      const panel  = document.getElementById('admin-panel');
      const toggle = document.getElementById('admin-toggle');
      if (!panel.contains(e.target) && e.target !== toggle) {
        panel.classList.remove('open');
      }
    });

    function adminJumpLevel(idx)  { window.gameAdminAPI?.jumpToLevel(idx); }
    function adminSkipLevel()     { window.gameAdminAPI?.skipLevel(); }
    function adminRestoreLives()  { window.gameAdminAPI?.restoreLives(); }

    // ── Mobile touch controls ─────────────────────────────────────────────────
    function bindTouchBtn(id, inputKey) {
      const el = document.getElementById(id);
      if (!el) return;
      el.addEventListener('touchstart', (e) => {
        e.preventDefault();
        window.mobileInput[inputKey] = true;
        if (inputKey === 'jump') window.mobileInput._jumpJustDown = true;
        el.classList.add('pressed');
      }, { passive: false });
      el.addEventListener('touchend', (e) => {
        e.preventDefault();
        window.mobileInput[inputKey] = false;
        el.classList.remove('pressed');
      }, { passive: false });
      el.addEventListener('touchcancel', () => {
        window.mobileInput[inputKey] = false;
        el.classList.remove('pressed');
      });
    }
    // mobileInput is defined in game.js; set a global reference so HTML can use it
    // The game sets window.mobileInput — we write through the same object
    // We need to set the global before game loads, so we initialise it here too
    if (!window.mobileInput) window.mobileInput = { left: false, right: false, jump: false, axisX: 0, _jumpJustDown: false };
    bindTouchBtn('btn-jump',  'jump');

    // ── Analogue joystick strip ───────────────────────────────────────────────
    (function () {
      const strip = document.getElementById('joystick-strip');
      const thumb = document.getElementById('joystick-thumb');
      if (!strip || !thumb) return;

      let trackingId = null; // which touch point we're following

      function _updateThumb(factor) {
        // factor: -1 (full left) … 0 (center) … +1 (full right)
        const halfW = strip.clientWidth / 2;
        const clampedF = Math.max(-1, Math.min(1, factor));
        // Position thumb: center is 50%, range is ±(50% - thumb_half - padding)
        const range = halfW - 34; // keep thumb inside strip
        const px = halfW + clampedF * range;
        thumb.style.left = px + 'px';
      }

      function _applyFactor(factor) {
        if (!window.mobileInput) return;
        // Store analogue factor; game.js reads it
        window.mobileInput.axisX = factor;
        // Also keep binary left/right for backwards compat with keyboard logic
        window.mobileInput.left  = factor < -0.1;
        window.mobileInput.right = factor >  0.1;
      }

      function _getTouchFactor(touch) {
        const rect = strip.getBoundingClientRect();
        const relX = touch.clientX - rect.left;
        // Normalise to -1 … +1 with a small dead-zone in the middle
        const raw = (relX / rect.width) * 2 - 1; // -1..+1
        const dead = 0.10;
        if (Math.abs(raw) < dead) return 0;
        // Rescale so edges of dead-zone map to 0
        return raw > 0
          ? (raw - dead) / (1 - dead)
          : (raw + dead) / (1 - dead);
      }

      strip.addEventListener('touchstart', (e) => {
        e.preventDefault();
        if (trackingId !== null) return; // already tracking
        const t = e.changedTouches[0];
        trackingId = t.identifier;
        strip.classList.add('active');
        const f = _getTouchFactor(t);
        _applyFactor(f);
        _updateThumb(f);
      }, { passive: false });

      strip.addEventListener('touchmove', (e) => {
        e.preventDefault();
        for (const t of e.changedTouches) {
          if (t.identifier === trackingId) {
            const f = _getTouchFactor(t);
            _applyFactor(f);
            _updateThumb(f);
            break;
          }
        }
      }, { passive: false });

      function _release() {
        trackingId = null;
        strip.classList.remove('active');
        _applyFactor(0);
        _updateThumb(0);
      }

      strip.addEventListener('touchend',    (e) => { e.preventDefault(); _release(); }, { passive: false });
      strip.addEventListener('touchcancel', ()  => { _release(); });
    })();



    // ── Auto-fullscreen on landscape, exit on portrait ────────────────────────
    function _isLandscape() {
      if (screen.orientation && screen.orientation.type) {
        return screen.orientation.type.startsWith('landscape');
      }
      return window.innerWidth > window.innerHeight;
    }

    function _enterFullscreen() {
      const el = document.documentElement;
      const req = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen || el.msRequestFullscreen;
      if (req) req.call(el).catch(() => {});
    }

    function _exitFullscreen() {
      const ex = document.exitFullscreen || document.webkitExitFullscreen || document.mozCancelFullScreen || document.msExitFullscreen;
      if (ex && (document.fullscreenElement || document.webkitFullscreenElement)) ex.call(document).catch(() => {});
    }

    function _handleOrientation() {
      if (_isLandscape()) {
        _enterFullscreen();
      } else {
        _exitFullscreen();
      }
    }

    // Listen for orientation changes (modern API + legacy fallback)
    if (screen.orientation) {
      screen.orientation.addEventListener('change', _handleOrientation);
    }
    window.addEventListener('orientationchange', _handleOrientation);
    // Also handle resize (covers desktop window resize and some mobile edge-cases)
    window.addEventListener('resize', _handleOrientation);
    // Check immediately on page load
    _handleOrientation();
  </script>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
  <script src="js/sound.js"></script>
  <script src="js/game.js"></script>

  <script>
    // ── Mute button ───────────────────────────────────────────────────────────
    const _muteBtn = document.getElementById('mute-btn');
    function _syncMuteBtn() {
      const m = window.SoundManager && SoundManager.isMuted();
      _muteBtn.textContent = m ? '🔇' : '🔊';
      _muteBtn.classList.toggle('muted', !!m);
    }
    _muteBtn.addEventListener('click', () => {
      if (window.SoundManager) SoundManager.toggleMute();
      _syncMuteBtn();
    });
    window.addEventListener('load', _syncMuteBtn);

    // ── Cover screen ──────────────────────────────────────────────────────────
    const _cover = document.getElementById('cover-screen');

    function _dismissCover() {
      _cover.classList.add('hidden');
      // Remove from DOM after fade-out transition (600 ms)
      setTimeout(() => { _cover.remove(); }, 650);
      // Start music — this is the guaranteed user gesture
      if (window.SoundManager) SoundManager.startMusic();
    }

    _cover.addEventListener('click',     _dismissCover, { once: true });
    _cover.addEventListener('touchend',  _dismissCover, { once: true, passive: true });

    // After game.js loads and i18n is ready, call initAdminPanel
    // We poll until LEVELS is populated (loaded async)
    const _adminInitInterval = setInterval(() => {
      if (window.LEVELS && window.LEVELS.length > 0 && window.T) {
        clearInterval(_adminInitInterval);
        window.initAdminPanel(window.LEVELS);
      }
    }, 100);
  </script>
</body>
</html>

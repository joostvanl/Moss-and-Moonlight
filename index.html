<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moss & Moonlight — Enchanted Forest Platformer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a1628;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Georgia', serif;
      color: #88dd88;
    }
    #game-container {
      position: relative;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 0 60px rgba(100, 200, 150, 0.2);
    }

    /* ── Admin Panel ─────────────────────────────────── */
    #admin-toggle {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 1000;
      background: #1a2e1a;
      border: 1px solid #3a6b3a;
      color: #88dd88;
      font-family: 'Georgia', serif;
      font-size: 13px;
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
      opacity: 0.75;
      transition: opacity 0.2s;
    }
    #admin-toggle:hover { opacity: 1; }

    #admin-panel {
      position: fixed;
      top: 44px;
      right: 12px;
      z-index: 999;
      background: rgba(10, 22, 40, 0.96);
      border: 1px solid #2a5a2a;
      border-radius: 10px;
      padding: 14px 16px 16px;
      min-width: 200px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.7);
      display: none;
      flex-direction: column;
      gap: 8px;
    }
    #admin-panel.open { display: flex; }

    #admin-panel h3 {
      font-size: 13px;
      color: #aaffaa;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 4px;
      border-bottom: 1px solid #2a4a2a;
      padding-bottom: 6px;
    }

    .admin-section-label {
      font-size: 10px;
      color: #557755;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 4px;
    }

    .admin-btn {
      background: #162a16;
      border: 1px solid #2e5a2e;
      color: #88dd88;
      font-family: 'Georgia', serif;
      font-size: 13px;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      text-align: left;
      transition: background 0.15s, border-color 0.15s;
    }
    .admin-btn:hover {
      background: #1e3e1e;
      border-color: #55aa55;
      color: #aaffaa;
    }
    .admin-btn.danger {
      border-color: #5a2e2e;
      color: #dd8888;
    }
    .admin-btn.danger:hover {
      background: #3e1e1e;
      border-color: #aa5555;
      color: #ffaaaa;
    }
  </style>
</head>
<body>
  <button id="admin-toggle">⚙ Admin</button>

  <div id="admin-panel">
    <h3>Admin Panel</h3>

    <span class="admin-section-label">Levels</span>
    <button class="admin-btn" onclick="adminJumpLevel(0)">▶ Level 1 — Maanwoud</button>
    <button class="admin-btn" onclick="adminJumpLevel(1)">▶ Level 2 — Kristalgrotten</button>
    <button class="admin-btn" onclick="adminJumpLevel(2)">▶ Level 3 — Schaduwrijk</button>
    <button class="admin-btn" onclick="adminJumpLevel(3)">▶ Level 4 — De Krochten</button>
    <button class="admin-btn" onclick="adminJumpLevel(4)">▶ Level 5 — De Vuurgrot</button>

    <span class="admin-section-label">Actions</span>
    <button class="admin-btn" onclick="adminSkipLevel()">⏭ Skip to next level</button>
    <button class="admin-btn" onclick="adminRestoreLives()">♥ Restore all lives</button>

    <span class="admin-section-label">Editor</span>
    <button class="admin-btn" onclick="window.location.href='editor.html'">✏ Open Level Editor</button>
  </div>

  <div id="game-container"></div>

  <script>
    // Admin toggle
    document.getElementById('admin-toggle').addEventListener('click', () => {
      document.getElementById('admin-panel').classList.toggle('open');
    });

    // Close panel when clicking outside
    document.addEventListener('click', (e) => {
      const panel = document.getElementById('admin-panel');
      const toggle = document.getElementById('admin-toggle');
      if (!panel.contains(e.target) && e.target !== toggle) {
        panel.classList.remove('open');
      }
    });

    // These functions are called by the panel buttons and delegate to
    // the currently active Phaser GameScene via window.gameAdminAPI
    function adminJumpLevel(idx)    { window.gameAdminAPI?.jumpToLevel(idx); }
    function adminSkipLevel()       { window.gameAdminAPI?.skipLevel(); }
    function adminRestoreLives()    { window.gameAdminAPI?.restoreLives(); }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
